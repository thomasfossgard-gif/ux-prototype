}

let debugPreviewing = false; // true while the panel is overriding the live view
function buildRevealGhosts(includeRoutes = true) {
  revealLayer.destroyChildren();
  nodeLayer.find('.node').forEach(grp => {
    const isHovered = grp.id() === _hoveredNodeId;
    const showDot = _anchorHovered ? true : (_hoveredNodeId && isHovered);
    if (showDot) {
      revealLayer.add(new Konva.Circle({ x: grp.x(), y: grp.y(), radius: 7, fill: 'rgba(255,255,255,0.5)', stroke: 'rgba(255,255,255,0.8)', strokeWidth: 1.5, listening: false }));
    }
  });
  if (includeRoutes) {
    edgeLayer.find('.routepath').forEach(el => {
      revealLayer.add(new Konva.Path({ data: el.data(), stroke: 'rgba(255,255,255,0.25)', strokeWidth: el.strokeWidth(), lineCap: 'round', lineJoin: 'round', listening: false }));
    });
    uiLayer.find('.slot').forEach(grp => {
      const rect = grp.findOne('Rect'); if (!rect) return;
      revealLayer.add(new Konva.Rect({ x: grp.x() + rect.x(), y: grp.y() + rect.y(), width: rect.width(), height: rect.height(), cornerRadius: rect.cornerRadius(), stroke: 'rgba(255,255,255,0.25)', strokeWidth: rect.strokeWidth(), dash: rect.dash(), fill: 'rgba(255,255,255,0.03)', listening: false }));
    });
  }
  nodeLayer.find('.node').forEach(nodeGrp => {
    const node = nodes.find(n => n.id === nodeGrp.id());
    if (!node) return;
    if (lineDraft && lineDraft.fromNode.id === node.id) return;
    const counts = {};
    (node.scrap || []).forEach(p => { counts[p.type] = (counts[p.type] || 0) + 1; });
    const entries = SCRAP_TYPES.map(t => [t, counts[t.id] || 0]).filter(([, c]) => c > 0);
    entries.sort((a, b) => b[1] - a[1]);
    if (entries.length > 0) {
      const VS = VISUAL_STYLES.scrapStack;
      const maxCount = entries[0][1];
      const spacing = maxCount <= VS.normalizeThreshold ? VS.naturalSpacing : VS.maxHeight / (maxCount - 1);
      const totalW = (entries.length - 1) * VS.columnSpacing;
      const startX = nodeGrp.x() - totalW / 2;
      entries.forEach(([tpl, count], col) => {
        const cx = startX + col * VS.columnSpacing;
        for (let i = count - 1; i >= 0; i--) {
          const cy = nodeGrp.y() + VS.baseOffsetY - i * spacing;
          revealLayer.add(new Konva.RegularPolygon({
            x: cx, y: cy, sides: 3, radius: VS.radius,
            fill: VS.fill,

// Resolve the effective vis state for a type in a given view, following 'inherit'
// back to ViewDefault. Returns 'visible' | 'hidden' | 'highlighted'.
function resolveVisState(viewKey, typeKey) {
  const state = VIEW_MODES[viewKey] && VIEW_MODES[viewKey].visible[typeKey];
  if (!state || state === 'inherit') return VIEW_MODES.ViewDefault.visible[typeKey] || 'visible';
  return state;
}

function applyDebugVisibility() {
  // The Debug → View Modes tab is purely about visual states. While the user is
  // previewing a specific view via the panel, that view drives the live display.
  // Otherwise, the effective view (game mode default + viewFocusStack) does.
  const effectiveView = viewFocusStack.length
    ? viewFocusStack[viewFocusStack.length - 1]
    : MODES[currentMode].view;
  // ViewHoverReveal is readonly — track the panel to its public alias ViewGhost.
  const panelView = effectiveView === 'ViewHoverReveal' ? 'ViewGhost' : effectiveView;
  if (!debugPreviewing && debugActiveView !== panelView) {
    debugActiveView = panelView;
    if (debugOpen) renderDebugPanel();
  }
  const view = debugPreviewing ? debugActiveView : effectiveView;
  const showAnchors = (view === 'ViewGhost' || view === 'ViewHoverReveal');
  edgeLayer.find('.mini-anchor').forEach(a => a.visible(showAnchors));
  if (view === 'ViewHoverReveal') {
    VISUAL_TYPES.forEach(t => t.apply(false));
    buildRevealGhosts();
    edgeLayer.batchDraw();
    return;
  }
  if (view === 'ViewGhost') {
    VISUAL_TYPES.forEach(t => t.apply(resolveVisState('ViewGhost', t.key) !== 'hidden'));
    buildRevealGhosts(false);
    routes.forEach(route => {
      const routeGrp = edgeLayer.findOne('#' + route.id);
      if (routeGrp) { const rp = routeGrp.findOne('.routepath'); rp.stroke('rgba(255,255,255,0.55)'); rp.visible(true); }
      const slotGrp = uiLayer.findOne('#slot_' + route.id);
      if (slotGrp) {
        const rect = slotGrp.findOne('Rect');
        rect.stroke('rgba(255,255,255,0.55)'); rect.visible(true);
      }
    });
    edgeLayer.batchDraw();
    uiLayer.batchDraw();
    return;
  }
  clearRevealGhosts();
  if (!VIEW_MODES[view]) return;
  VISUAL_TYPES.forEach(t => t.apply(resolveVisState(view, t.key) !== 'hidden'));
}

// Event delegation at the DOCUMENT level — survives every re-render
// and doesn't care when the rows came into existence.
document.addEventListener('click', e => {
  if (!e.target.closest || !e.target.closest('#debug-panel')) return;
  const btn = e.target.closest('[data-action="toggle"]');
  if (btn) {
    e.stopPropagation();
    console.log('[debug] toggle vis:', btn.dataset.key);
    toggleDebugVis(btn.dataset.key);
    return;
  }
  const row = e.target.closest('[data-action="expand"]');
  if (row) {
    console.log('[debug] expand:', row.dataset.key);
    toggleDebugExpand(row.dataset.key);
  }
});

function toggleDebugExpand(typeKey) {
  if (expandedTypes.has(typeKey)) expandedTypes.delete(typeKey);
  else expandedTypes.add(typeKey);
  renderDebugPanel();
}

function toggleDebugVis(typeKey) {
  const v = VIEW_MODES[debugActiveView];
  if (!v) return;
  const cur = v.visible[typeKey] || 'visible';
  // ViewDefault: 2-state toggle (visible ↔ hidden).
  // Contextual modes: 3-state cycle (visible → hidden → inherit → visible).
  const cycle = (debugActiveView === 'ViewDefault')
    ? ['visible', 'hidden']
    : ['visible', 'hidden', 'inherit'];
  const idx = cycle.indexOf(cur);
  v.visible[typeKey] = cycle[(idx + 1) % cycle.length];
  // Preview the change live if the panel's active view differs from the effective view.
  const effectiveView = viewFocusStack.length
    ? viewFocusStack[viewFocusStack.length - 1]
    : MODES[currentMode].view;
  debugPreviewing = (debugActiveView !== effectiveView);
  applyDebugVisibility();
  renderDebugPanel();
}

const LEVEL_VERSION = 1;
function serializeLevel() {
  return {
    version: LEVEL_VERSION,
    savedAt: new Date().toISOString(),
    stage: { x: stage.x(), y: stage.y(), scale: stage.scaleX() },
    palette: {
      objects: palette.objects.map(o => ({ id: o.id, kind: o.kind, color: o.color })),
      workers: palette.workers.map(w => ({ id: w.id, kind: w.kind, color: w.color, capacity: w.capacity, name: w.name })),
    },
    nodes: nodes.map(n => ({
      id: n.id, templateId: n.templateId, x: n.x, y: n.y, color: n.color, items: n.items,
      shape: n.shape, label: n.label, scrap: n.scrap || [],
    })),
    routes: routes.map(r => ({
      id: r.id, fromId: r.fromId, toId: r.toId, color: r.color, workerId: r.workerId,
      allowedTypes: r.allowedTypes || defaultAllowedTypes(),
    })),
    workers: workers.map(w => ({
      id: w.id, templateId: w.templateId, color: w.color, capacity: w.capacity,
      x: w.x, y: w.y, routeId: w.routeId, inventory: w.inventory || {},
      segIdx: w.segIdx, segT: w.segT, dir: w.dir,
      targetX: w.targetX, targetY: w.targetY,
    })),
    viewModes: Object.fromEntries(Object.entries(VIEW_MODES).map(([k, v]) => [k, { visible: { ...v.visible } }])),
    nextId,
  };
}
function downloadLevel() {
  const json = JSON.stringify(serializeLevel(), null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  a.download = `level-${stamp}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  URL.revokeObjectURL(url);
  setLevelStatus('Saved ' + a.download);
}
function clearAllLevelShapes() {
  nodeLayer.destroyChildren();
  edgeLayer.destroyChildren();
  workerLayer.destroyChildren();
  uiLayer.destroyChildren();
  nodes = []; routes = []; workers = [];
}
function loadLevelData(data) {
  if (!data || data.version !== LEVEL_VERSION) {
    throw new Error('Unsupported level version: ' + (data && data.version));
  }
  clearAllLevelShapes();

  // Palette colors/capacities (template instances reference these)
  if (data.palette && Array.isArray(data.palette.objects)) {
    data.palette.objects.forEach(o => {
      const ex = palette.objects.find(p => p.id === o.id);
      if (ex && o.color) ex.color = o.color;
    });
  }
  if (data.palette && Array.isArray(data.palette.workers)) {
    data.palette.workers.forEach(o => {
      const ex = palette.workers.find(p => p.id === o.id);
      if (!ex) return;
      if (o.color) ex.color = o.color;
      if (typeof o.capacity === 'number') ex.capacity = o.capacity;
      if (o.name) ex.name = o.name;
    });
  }

  // Nodes
  (data.nodes || []).forEach(n => {
    let scrap = n.scrap || [];
    if (!Array.isArray(scrap)) { const arr = []; Object.entries(scrap).forEach(([type, count]) => { for (let i = 0; i < count; i++) arr.push({ type }); }); scrap = arr; }
    const node = { id: n.id, templateId: n.templateId, x: n.x, y: n.y, color: n.color, items: scrap.length, shape: n.shape || 'rect', label: n.label || '', scrap };
    nodes.push(node);
    drawNode(node);
  });
  // Routes (also creates slots)
  (data.routes || []).forEach(r => {
    const route = {
      id: r.id, fromId: r.fromId, toId: r.toId, color: r.color, workerId: r.workerId || null,
      allowedTypes: r.allowedTypes || defaultAllowedTypes(),
      states: { recentlyCreated: false },
    };
    routes.push(route);
    drawRoute(route);
  });
  // Workers
  (data.workers || []).forEach(wd => {
    const w = {
      id: wd.id, templateId: wd.templateId, color: wd.color, capacity: wd.capacity,
      x: wd.x, y: wd.y, routeId: wd.routeId || null, inventory: wd.inventory || {}, noScrap: false,
      segIdx: wd.segIdx || 0, segT: wd.segT || 0, dir: wd.dir || 1,
      targetX: wd.targetX != null ? wd.targetX : null,
      targetY: wd.targetY != null ? wd.targetY : null,
      states: { lifting: false },
    };
    workers.push(w);
    drawWorker(w);
  });

  // ID counter + color rotation
  if (typeof data.nextId === 'number') nextId = data.nextId;

  // Stage transform
  if (data.stage) {
    stage.scale({ x: data.stage.scale || 1, y: data.stage.scale || 1 });
    stage.position({ x: data.stage.x || 0, y: data.stage.y || 0 });
    drawGrid();
    stage.batchDraw();
  }
  // View modes
  if (data.viewModes) {
    Object.entries(data.viewModes).forEach(([k, v]) => {
      if (VIEW_MODES[k] && v && v.visible) {
        Object.entries(v.visible).forEach(([typeKey, val]) => {
          if (VIS_STATES.includes(val)) VIEW_MODES[k].visible[typeKey] = val;
        });
      }
    });
  }

  // Re-render dependent UI

  renderPalette();
  applyMode();
  applyHitboxVisibility();
}
function uploadLevel() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json,application/json';
  input.onchange = e => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        loadLevelData(data);
        setLevelStatus('Loaded ' + file.name);
      } catch (err) {
        setLevelStatus('Load failed: ' + err.message);
      }
    };
    reader.readAsText(file);
  };
  input.click();
}
function setLevelStatus(msg) {
  const el = document.getElementById('level-status');
  if (el) el.textContent = msg;
}

document.getElementById('btn-load-level').addEventListener('click', uploadLevel);

function vsIsColor(value) {
  if (typeof value !== 'string') return false;
  return /^#[0-9a-f]{3,8}$/i.test(value) || /^rgba?\(/i.test(value);
}
function vsParseRgba(s) {
  const m = s.match(/^rgba?\(\s*(\d+)\s*,\s*(\d+)\s*,\s*(\d+)\s*(?:,\s*([\d.]+)\s*)?\)$/i);
  if (!m) return null;

}
function vsToHex(value) {
  if (typeof value !== 'string') return '#000000';
  if (/^#[0-9a-f]{6}$/i.test(value)) return value.toLowerCase();
  if (/^#[0-9a-f]{3}$/i.test(value)) {
    return '#' + value.slice(1).split('').map(c => c + c).join('').toLowerCase();
  }
  if (/^#[0-9a-f]{8}$/i.test(value)) return value.slice(0, 7).toLowerCase();
  const rgba = vsParseRgba(value);
  if (rgba) {
    const h = n => n.toString(16).padStart(2, '0');
    return '#' + h(rgba.r) + h(rgba.g) + h(rgba.b);

}

  const rgba = typeof originalValue === 'string' ? vsParseRgba(originalValue) : null;
  if (rgba && rgba.a < 1) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${rgba.a})`;
  }

}
function vsGetAlpha(value) {
  if (typeof value !== 'string') return 1;
  const rgba = vsParseRgba(value);

}

  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return alpha >= 1 ? hex : `rgba(${r},${g},${b},${alpha})`;

    btn.addEventListener('click', e => {

}

function vsRenderTypeRow(typeKey) {
  const open = VS_OPEN_TYPES.has(typeKey);
  const dirty = vsTypeIsDirty(typeKey);

  const meta = dirty ? `${changedCount} changed` : '';

      <div class="vs-type-body ${open ? 'open' : ''}">
        ${open ? vsRenderProps(typeKey) : ''}
      </div>
    </div>`;

function vsRenderProps(typeKey) {
  const live = VISUAL_STYLES[typeKey];
  const def = VISUAL_STYLES_DEFAULT[typeKey];
  const rows = Object.keys(def).map(k => {
    const v = live[k];
    const changed = v !== def[k];
    let inputHtml;
    if (vsIsColor(v)) {
      const hex = vsToHex(v);
      const alpha = vsGetAlpha(v);
      inputHtml = `
        <input type="color" class="vs-prop-color-swatch" value="${hex}" data-type="${typeKey}" data-prop="${k}">
        <input type="range" class="vs-prop-opacity" min="0" max="100" value="${Math.round(alpha * 100)}" data-type="${typeKey}" data-prop="${k}" title="Opacity">
        <input type="text" class="vs-prop-input color-text" value="${escapeAttr(v)}" data-type="${typeKey}" data-prop="${k}" data-kind="text">`;
    } else if (typeof v === 'number') {
      inputHtml = `<input type="number" step="any" class="vs-prop-input" value="${v}" data-type="${typeKey}" data-prop="${k}" data-kind="number">`;
    } else {
      inputHtml = `<input type="text" class="vs-prop-input" value="${escapeAttr(String(v))}" data-type="${typeKey}" data-prop="${k}" data-kind="text">`;
    }
    return `
      <div class="vs-prop-row">
        <label class="${changed ? 'changed' : ''}" title="${k} (default: ${escapeAttr(String(def[k]))})">${k}</label>
        ${inputHtml}
        <button class="vs-prop-reset" title="Reset to default" data-type="${typeKey}" data-prop="${k}">↺</button>
      </div>`;
  }).join('');
  return rows + `
    <div class="vs-type-actions">
      <button data-vs-action="copy-type" data-type="${typeKey}">Copy Prompt</button>
      <button data-vs-action="reset-type" data-type="${typeKey}">Reset Type</button>
    </div>`;
}

function escapeAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function vsHandleInput(input) {
  const typeKey = input.dataset.type;
  const prop = input.dataset.prop;
  const kind = input.dataset.kind;
  let v = input.value;
  if (kind === 'number') {
    const n = parseFloat(v);
    if (!Number.isFinite(n)) return;
    v = n;
  }
  VISUAL_STYLES[typeKey][prop] = v;
  applyVisualStyles(typeKey);
  vsRefreshHeader(typeKey);
}
function vsHandleColorSwatch(swatch) {
  const typeKey = swatch.dataset.type;
  const prop = swatch.dataset.prop;
  const original = VISUAL_STYLES[typeKey][prop];
  const newVal = vsApplyHexPreservingAlpha(original, swatch.value);
  VISUAL_STYLES[typeKey][prop] = newVal;
  const text = swatch.parentElement.querySelector('.color-text');
  if (text) text.value = newVal;
  applyVisualStyles(typeKey);
  vsRefreshHeader(typeKey);
}
function vsHandleOpacity(slider) {
  const typeKey = slider.dataset.type;
  const prop = slider.dataset.prop;
  const alpha = parseFloat(slider.value) / 100;
  const original = VISUAL_STYLES[typeKey][prop];
  const newVal = vsApplyAlpha(original, alpha);
  VISUAL_STYLES[typeKey][prop] = newVal;
  const text = slider.parentElement.querySelector('.color-text');
  if (text) text.value = newVal;
  applyVisualStyles(typeKey);
  vsRefreshHeader(typeKey);
}
function vsRefreshHeader(typeKey) {
  const list = document.getElementById('vs-list');
  if (!list) return;
  const hdr = list.querySelector(`.vs-type-header[data-type="${typeKey}"]`);
  if (!hdr) return;
  const dirty = vsTypeIsDirty(typeKey);
  hdr.classList.toggle('dirty', dirty);
  const meta = hdr.querySelector('.vs-type-meta');
  if (meta) {
    const n = vsChangedKeys(typeKey).length;
    meta.textContent = dirty ? `${n} changed` : '';
    meta.classList.toggle('dirty', dirty);
  }
  // Update changed-label highlighting in body without rebuilding inputs (would steal focus).
  const body = hdr.nextElementSibling;
  if (body) {
    const def = VISUAL_STYLES_DEFAULT[typeKey];
    const live = VISUAL_STYLES[typeKey];
    body.querySelectorAll('.vs-prop-row').forEach(row => {
      const lbl = row.querySelector('label');
      const propInput = row.querySelector('[data-prop]');
      if (!lbl || !propInput) return;
      const k = propInput.dataset.prop;
      lbl.classList.toggle('changed', live[k] !== def[k]);
    });
  }
}
function vsResetProp(typeKey, prop) {
  VISUAL_STYLES[typeKey][prop] = VISUAL_STYLES_DEFAULT[typeKey][prop];
  applyVisualStyles(typeKey);
  renderVisualsTab();
}
function vsResetType(typeKey) {
  Object.assign(VISUAL_STYLES[typeKey], VISUAL_STYLES_DEFAULT[typeKey]);
  applyVisualStyles(typeKey);
  renderVisualsTab();
}
function vsResetAll() {
  Object.keys(VISUAL_STYLES).forEach(k => {
    Object.assign(VISUAL_STYLES[k], VISUAL_STYLES_DEFAULT[k]);
    applyVisualStyles(k);
  });
  renderVisualsTab();
}
function vsResetDecorationsAll() {
  DECORATION_TYPES.forEach(k => {
    Object.assign(VISUAL_STYLES[k], VISUAL_STYLES_DEFAULT[k]);
    applyVisualStyles(k);
  });
  renderDecorationsTab();
}

function vsBuildPrompt(typeKeys) {
  const dirty = typeKeys.filter(k => vsTypeIsDirty(k));
  if (dirty.length === 0) {
    return 'No visual properties have been changed from defaults.';
  }
  const lines = [];
  lines.push('Update visual properties in index.html (the VISUAL_STYLES_DEFAULT object near APP_VERSION).');
  lines.push('');
  lines.push('The following changes were dialed in via the Visuals tab and should become the new defaults:');
  lines.push('');
  dirty.forEach(typeKey => {
    lines.push(`# ${VS_TYPE_LABELS[typeKey]} (VISUAL_STYLES.${typeKey})`);
    vsChangedKeys(typeKey).forEach(k => {
      const oldV = VISUAL_STYLES_DEFAULT[typeKey][k];
      const newV = VISUAL_STYLES[typeKey][k];
      lines.push(`  ${k}: ${JSON.stringify(oldV)} → ${JSON.stringify(newV)}`);
    });
    lines.push('');
  });
  lines.push('Apply these by editing the corresponding entries inside VISUAL_STYLES_DEFAULT. The draw functions already read from VISUAL_STYLES, so no other code changes are required.');
  return lines.join('\n');
}

async function vsCopy(text) {
  try {
    await navigator.clipboard.writeText(text);
    return true;
  } catch (err) {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); document.body.removeChild(ta); return true; }
    catch { document.body.removeChild(ta); return false; }
  }
}
async function vsCopyTypePrompt(typeKey) {
  const text = vsBuildPrompt([typeKey]);
  await vsCopy(text);
  vsFlashToolbar('Copied prompt');
}
async function vsCopyAllPrompt(typeKeys) {
  if (!typeKeys) typeKeys = Object.keys(VS_TYPE_LABELS);

  await vsCopy(text);
  vsFlashToolbar('Copied prompt');
}

// Apply current VISUAL_STYLES values to all live Konva shapes of the given type.
function applyVisualStyles(typeKey) {
  const V = VISUAL_STYLES[typeKey];
  if (!V) return;
  switch (typeKey) {
    case 'worker': {
      const S = V.size / 2;
      stage.find('.worker').forEach(grp => {
        const img = grp.findOne('.workercircle');
        if (img) {
          img.x(-S); img.y(-S); img.width(S*2); img.height(S*2);
          img.cornerRadius(V.cornerRadius);
          img.stroke(V.strokeColor); img.strokeWidth(V.strokeWidth);
          // Reflow portrait crop with new zoom.
          const native = img.image();
          if (native) {
            const iw = native.naturalWidth || 128, ih = native.naturalHeight || 128;
            const cw = iw / V.portraitZoom, ch = ih / V.portraitZoom;
            img.cropX((iw - cw) / 2); img.cropY((ih - ch) / 2);
            img.cropWidth(cw); img.cropHeight(ch);
          }
        }
        const hb = grp.findOne('.hitbox-worker');
        if (hb) { hb.x(-S); hb.y(-S); hb.width(S*2); hb.height(S*2); }
        const lbl = grp.findOne('.workerlabel');
        if (lbl) {
          lbl.fontSize(V.labelFontSize); lbl.fill(V.labelColor); lbl.y(S + V.labelOffsetY);
          lbl.x(-lbl.width() / 2);
        }
      });
      workerLayer.batchDraw();
      break;
    }
    case 'pileSquare': {
      PILE_DOT_PATTERN = buildPileDotPattern(V.dotPatternColor);
      const half = V.size / 2;
      stage.find('.node').forEach(grp => {
        const shape = grp.findOne('.nodeshape');
        if (!shape) return;
        if (shape.className !== 'Rect') return;
        shape.x(-half); shape.y(-half);
        shape.width(V.size); shape.height(V.size);
        shape.cornerRadius(V.cornerRadius);
        shape.strokeWidth(V.strokeWidth);
        const tex = grp.findOne('.nodetex');
        if (tex) {
          tex.x(-(half - 2)); tex.y(-(half - 2));
          tex.width(V.size - 4); tex.height(V.size - 4);
          tex.fillPatternImage(PILE_DOT_PATTERN);
        }
      });
      nodeLayer.batchDraw();
      break;
    }
    case 'pileStackPiece': {
      stage.find('.stackpiece').forEach(p => {
        p.radius(V.radius); p.stroke(V.strokeColor); p.strokeWidth(V.strokeWidth);
      });
      nodeLayer.batchDraw();
      break;
    }
    case 'route': {
      const rc = routeColor();
      routes.forEach(j => {
        const grp = edgeLayer.findOne('#' + j.id); if (!grp) return;
        const pd = routePathData(j);
        const rp = grp.findOne('.routepath');
        if (rp) { rp.data(pd); rp.strokeWidth(V.strokeWidth); rp.dash([V.dashOn, V.dashOff]); rp.stroke(rc); }
        grp.findOne('.hover-hit-route')?.data(pd);
      });
      stage.find('.slot-rect').forEach(r => { r.stroke(rc); r.shadowColor(rc); });
      edgeLayer.batchDraw();
      uiLayer.batchDraw();
      break;
    }
    case 'slotRect': {
      const half = V.size / 2;
      stage.find('.slot-rect').forEach(r => {
        r.x(-half); r.y(-half);
        r.width(V.size); r.height(V.size);
        r.cornerRadius(V.cornerRadius);
        r.strokeWidth(V.strokeWidth);
        r.dash([V.dashOn, V.dashOff]);
        r.shadowOpacity(V.shadowOpacity);
        r.fill(V.fill);
      });
      uiLayer.batchDraw();
      break;
    }
    case 'slotGear': {
      stage.find('.slot-gear').forEach(t => {
        t.text(V.text); t.fontSize(V.fontSize); t.fill(V.color);
        t.opacity(V.restOpacity); t.x(V.offsetX); t.y(V.offsetY);
      });
      uiLayer.batchDraw();
      break;
    }
    case 'slotDelete': {
      stage.find('.slot-del').forEach(t => {
        t.text(V.text); t.fontSize(V.fontSize); t.fill(V.color);
        t.opacity(V.restOpacity); t.x(V.offsetX); t.y(V.offsetY);
      });
      uiLayer.batchDraw();
      break;
    }
    case 'carryIndicator': {
      stage.find('.carry').forEach(grp => {
        grp.y(V.offsetY);
        SCRAP_TYPES.forEach((t, i) => {
          const tri = grp.findOne('.carry-' + t.id);
          if (!tri) return;
          tri.x((i - (SCRAP_TYPES.length - 1) / 2) * V.spacing);
          tri.radius(V.radius);
          tri.stroke(V.strokeColor);
          tri.strokeWidth(V.strokeWidth);
        });
      });
      workerLayer.batchDraw();
      break;
    }
    case 'speechBubble':
      // Only affects new speech bubbles (they live ~1.5s) — no live shapes to retrofit.
      break;
    case 'trafficLightMan':
      renderPalette();
      redrawAllWorkers();
      break;
    case 'assignTriangle': {
      // sceneFunc reads VISUAL_STYLES live (width/height/cornerRadius update on next draw).
      // fill/stroke are Konva properties — update them directly, then redraw if position changed.
      const posChanged = ['offsetY', 'height'].some(k => VISUAL_STYLES_DEFAULT.assignTriangle[k] !== V[k]);
      if (posChanged) {
        redrawAllWorkers();
      } else {
        workerLayer.find('.assign-triangle').forEach(t => {
          t.fill(V.color); t.stroke(V.strokeColor); t.strokeWidth(V.strokeWidth);
        });
        workerLayer.batchDraw();
      }
      break;
    }
    case 'hintText': { applyHintPosition(); break; }
    case 'physicsGhost': {
      const g = uiLayer.findOne('.physics-ghost-grp');
      if (g) { g.opacity(V.opacity); uiLayer.batchDraw(); }
      break;
    }
    case 'dragPortrait': {
      const S = V.size;
      workerLayer.find('.drag-portrait-grp').forEach(dpg => {
        const bg = dpg.findOne('.drag-portrait-bg');
        if (bg) { bg.x(-S/2); bg.y(0); bg.width(S); bg.height(S); bg.cornerRadius(V.cornerRadius); bg.stroke(V.strokeColor); bg.strokeWidth(V.strokeWidth); } // position (offsetY) is applied live in onTriMove
        const dpi = dpg.findOne('.drag-portrait-img');
        if (dpi) {
          dpi.x(-S/2); dpi.y(0); dpi.width(S); dpi.height(S); dpi.cornerRadius(V.cornerRadius);
          const native = dpi.image();
          if (native && native.naturalWidth) {
            const zoom = VISUAL_STYLES.worker.portraitZoom;
            const iw = native.naturalWidth, ih = native.naturalHeight;
            const cw = iw / zoom, ch = ih / zoom;
            dpi.cropX((iw - cw) / 2); dpi.cropY((ih - ch) / 2); dpi.cropWidth(cw); dpi.cropHeight(ch);
          }
        }
      });
      workerLayer.batchDraw();
      break;
    }
    case 'hitboxMiniAnchor': {
      stage.find('.mini-anchor').forEach(a => a.radius(V.radius));
      edgeLayer.batchDraw();
      break;
    }
    case 'miniAnchor': {
      stage.find('.mini-anchor').forEach(a => {
        a.stroke(V.strokeColor);
        a.strokeWidth(V.strokeWidth);
      });
      // Stub length affects path geometry — re-path all routes
      routes.forEach(j => {
        const grp = edgeLayer.findOne('#' + j.id); if (!grp) return;
        const pd = routePathData(j);
        grp.findOne('.routepath')?.data(pd);
        grp.findOne('.hover-hit-route')?.data(pd);
      });
      edgeLayer.batchDraw();
      break;
    }
    case 'scrapStack':
      buildRevealGhosts();
      break;
    case 'guiPanel':
    case 'routeFilter':
      if (_filterPanel) { closeRouteFilter(false); }
      break;
    case 'tickIndicator': {
      const el = document.getElementById('tick-indicator');
      if (el) {
        el.style.width = V.size + 'px';
        el.style.height = V.size + 'px';
        el.style.border = `${V.borderWidth}px solid ${V.borderColor}`;
        el.style.borderRadius = V.cornerRadius + 'px';
        el.style.marginTop = -(V.size / 2) + 'px';
      }
      break;
    }
    case 'building': {
      const w = V.width / 2, h = V.height / 2;
      stage.find('[data-shape=building]').forEach(grp => {
        const top = grp.findOne('.building-top');
        const bot = grp.findOne('.building-bottom');
        if (top) { top.x(-w); top.y(-h); top.width(V.width); top.height(h); top.cornerRadius([V.cornerRadius, V.cornerRadius, 0, 0]); top.fill(V.topColor); top.stroke(V.strokeColor); top.strokeWidth(V.strokeWidth); }
        if (bot) { bot.x(-w); bot.y(0); bot.width(V.width); bot.height(h); bot.cornerRadius([0, 0, V.cornerRadius, V.cornerRadius]); bot.fill(V.bottomColor); bot.stroke(V.strokeColor); bot.strokeWidth(V.strokeWidth); }
      });
      nodeLayer.batchDraw();
      break;
    }
    case 'buildingDoor': {
      stage.find('.building-door').forEach(d => {
        d.x(V.offsetX - V.width/2); d.y(V.offsetY - V.height/2);
        d.width(V.width); d.height(V.height);
        d.fill(V.color);
      });
      nodeLayer.batchDraw();
      break;
    }
    case 'buildingSupport': {
      stage.find('.building-support').forEach(s => {
        s.width(V.width); s.height(V.height);
        s.fill(V.color);
      });
      nodeLayer.batchDraw();
      break;
    }
    case 'buildingChimney': {
      stage.find('.building-chimney').forEach(c => {
        c.x(V.offsetX - V.width/2); c.y(V.offsetY - V.height/2);
        c.width(V.width); c.height(V.height);
        c.fill(V.color);
      });
      nodeLayer.batchDraw();
      break;
    }
    case 'buildingSign': {
      stage.find('.building-sign-bg').forEach(bg => {
        bg.x(-V.width/2); bg.y(V.offsetY - V.height/2);
        bg.width(V.width); bg.height(V.height);
        bg.fill(V.color);
      });
      stage.find('.building-sign-text').forEach(txt => {
        txt.x(-V.width/2); txt.y(V.offsetY - V.height/2 + 3);
        txt.width(V.width); txt.height(V.height);
        txt.fontSize(V.fontSize);
        txt.fill(V.textColor);
      });
      nodeLayer.batchDraw();
      break;
    }
    case 'tree': {
      stage.find('.tree-trunk').forEach(t => {
        t.x(-V.trunkWidth/2); t.y(V.canopyHeight - V.trunkHeight);
        t.width(V.trunkWidth); t.height(V.trunkHeight);
        t.fill(V.trunkColor);
      });
      stage.find('.tree-canopy').forEach(c => {
        c.y(V.canopyRadius * 0.3);
        c.radius(V.canopyRadius);
        c.fill(V.canopyColor);
      });

      break;
    }
    case 'hitboxPile': {
      stage.find('.hitbox-pile').forEach(c => c.radius(V.radius));
      nodeLayer.batchDraw();
      break;
    }
    case 'hitboxAnchor': {
      stage.find('.anchor-hit').forEach(c => c.radius(V.radius));

    }
    case 'hitboxRouteHover': {
      stage.find('.hover-hit-route').forEach(p => p.strokeWidth(V.strokeWidth));
      edgeLayer.batchDraw();
      break;
    }
    case 'hitboxWorker': {
      const VT = VISUAL_STYLES.trafficLightMan;
      const totalH = VT.headRadius * 2 + VT.neckGap + VT.torsoHeight + VT.legGap + VT.legHeight;
      const figHalfW = VT.torsoWidth / 2 + VT.armGap + VT.armWidth;
      const pad = V.pad;
      stage.find('.hitbox-worker').forEach(s => {
        s.x(-(figHalfW + pad)); s.y(-(totalH / 2 + pad));
        s.width((figHalfW + pad) * 2); s.height(totalH + pad * 2);
      });
      workerLayer.batchDraw();
      break;
    }
    case 'hitboxTri': {
      const VT = VISUAL_STYLES.trafficLightMan;
      const VA = VISUAL_STYLES.assignTriangle;
      const totalH = VT.headRadius * 2 + VT.neckGap + VT.torsoHeight + VT.legGap + VT.legHeight;
      const headTopY = VT.headOffsetY - totalH / 2;
      const triRestY = headTopY - VA.gap - VA.height;
      const pad = V.pad;
      stage.find('.hitbox-tri').forEach(s => {
        s.x(-(VA.width / 2 + pad)); s.y(triRestY - pad);
        s.width(VA.width + pad * 2); s.height(VA.height + pad * 2);
      });
      workerLayer.batchDraw();
      break;
    }
    case 'hitboxSlot': {
      stage.find('.hitbox-slot').forEach(c => c.radius(V.radius));
      uiLayer.batchDraw();
      break;
    }
    case 'hitboxSlotHover': {
      const VSR = VISUAL_STYLES.slotRect;
      const VSD = VISUAL_STYLES.slotDelete;
      const VSG = VISUAL_STYLES.slotGear;
      const pad = V.pad;
      const slotHalf = VSR.size / 2;
      const left  = Math.min(-slotHalf, VSD.offsetX) - pad;
      const right = Math.max(slotHalf, VSG.offsetX + VSG.fontSize) + pad;
      const top   = Math.min(-slotHalf, VSG.offsetY, VSD.offsetY) - pad;
      stage.find('.hover-hit-slot').forEach(s => {
        s.x(left); s.y(top);
        s.width(right - left); s.height(slotHalf + pad - top);
      });
      uiLayer.batchDraw();
      break;
    }
    case 'hitboxSlotIcons': {
      const VSD = VISUAL_STYLES.slotDelete;
      const VSG = VISUAL_STYLES.slotGear;
      const pad = V.pad;
      stage.find('.slot-gearhit').forEach(s => {
        s.x(VSG.offsetX - pad); s.y(VSG.offsetY - pad);
        s.width(VSG.fontSize + pad * 2); s.height(VSG.fontSize + pad * 2);
      });
      stage.find('.slot-delhit').forEach(s => {
        const ep = pad + 2;
        s.x(VSD.offsetX - ep); s.y(VSD.offsetY - ep);
        s.width(VSD.fontSize + ep * 2); s.height(VSD.fontSize + ep * 2);
      });
      stage.find('.slot-delbg').forEach(s => {
        s.x(VSD.offsetX - pad); s.y(VSD.offsetY - pad);
        s.width(VSD.fontSize + pad * 2); s.height(VSD.fontSize + pad * 2);
      });
      uiLayer.batchDraw();
      break;
    }
  }
}

});

document.getElementById('vs-save-code').addEventListener('click', vsSaveToCode);
document.getElementById('dec-search').addEventListener('input', renderDecorationsTab);
document.getElementById('dec-copy-all').addEventListener('click', () => vsCopyAllPrompt(Array.from(DECORATION_TYPES)));
document.getElementById('dec-reset-all').addEventListener('click', () => vsResetDecorationsAll());
document.getElementById('dec-save-code').addEventListener('click', vsSaveToCode);
document.getElementById('hb-save-code').addEventListener('click', hbSaveToCode);
// Tick indicator's initial visual comes from inline CSS — push current defaults so
// changes to VISUAL_STYLES_DEFAULT.tickIndicator take effect without editing CSS.
applyVisualStyles('tickIndicator');

function toggleDebugPanel() {
  debugOpen = !debugOpen;
  const panel = document.getElementById('debug-panel');
  const toggle = document.getElementById('debug-toggle');
  panel.classList.toggle('open', debugOpen);
  toggle.style.right = debugOpen ? '280px' : '0';
  if (debugOpen) {
    if (debugActiveTab === 'options') renderOptionsPane();
    else renderDebugPanel();
  }
}

setInterval(() => {
  if (!debugOpen) return;
  if (debugActiveTab === 'viewmodes') renderDebugPanel();
}, 100);

// ===== INIT =====
renderPalette();
applyMode();

// Load bundled level if one has been embedded (works for all visitors on any device).
if (BUNDLED_LEVEL) { try { loadLevelData(BUNDLED_LEVEL); } catch (_) {} }
